services:
  - type: web
    name: llmlingua2-compressor
    runtime: python
    rootDir: web-app
    plan: starter
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FORCE_CPU
        value: "1"
      - key: HF_MODEL_ID
        value: bchhabra2490/llmlingua2-compressor
      - key: MODEL_URL
        value: https://huggingface.co/bchhabra2490/llmlingua2-compressor/resolve/main/model.safetensors
